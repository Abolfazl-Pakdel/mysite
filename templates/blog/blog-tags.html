<div class="single-sidebar-widget post-category-widget tag-cloud-widget">
    <h4 class="category-title">Tags Clouds</h4>
    <ul class="tags">
        {% for tag in post.tags.all %}
        <li>
            <a href="{% url 'blog:tag' tag_name=tag.name %}"><p>{{ tag.name }}</p></a>
        </li>
        {% endfor %}
    </ul>
</div>
